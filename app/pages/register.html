<!DOCTYPE hmtl>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>registrarse</title>
    <link rel ="stylesheet" href="style.css">
    <script src="register.js" defer></script>
</head>
<body>
    <main>
        <div class="form-container">
           <h1>Crear tu cuenta</h1> 
           <p>Crea tu cuenta para entrar al area de administracion.</p>
           <form id="register-form">
               <label for="user" class="sr-only">User</label>
               <input type="text" name="user" id="user" placeholder="Nombre de usuario">
               <label for="email" class="sr-only">Email</label>
                <input type="email" name="email" id="email" placeholder="correo electronico">
                <label for="password" class="sr-only">Password</label>
                 <input type="password" name="password" id="password" placeholder="Contraseña">
                <button>Registrate</button>
                <p class="error escondido">Error al registrarse</p>
           </form>
           <p>¿Ya te encuentras registrado? - <a href="/">Iniciar Sesion</a></p>
        </div>
    </main>
    
</body>   
</html>
