<!DOCTYPE hmtl>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Iniciar sesion</title>
    <link rel ="stylesheet" href="style.css">
    <script src="login.js" defer></script>
</head>
<body>
   <main>
    <div class="form-container">
    <h1>Iniciar sesion</h1>
    <p>Ingresa tus credenciales para acceder al area de administracion<p>
        <form id="login-form">
            <label for="user" class="sr-only">User</label>
            <input type="text" name="user" id="user" placeholder="nombre de usuario">
            <label for="password" class="sr-only">Password</label>
            <input type="password" name="password" id="password" placeholder="contraseña">
            <button type="submit">Iniciar Sesion</button>
            <p class="error escondido">Error al iniciar Sesion</p>
        </form>
    <p>¿Aun no te encuentras Registrado? - <a href="/register">registrate</a></p>
    </div>
   </main>
</body>   
</html>
